name: Build and Test

on:
  pull_request:
    paths-ignore: ['docs/**', 'README.md']
  push:
    branches: [master]
    paths-ignore: ['docs/**', 'README.md']

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      NODE_VERSION: '20'
      GO_VERSION: 'stable'
      MAGE_VERSION: 'latest'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: 'recursive'

      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --immutable --prefer-offline

      - name: Type check
        run: yarn typecheck

      - name: Lint
        run: yarn lint

      - name: Unit tests
        run: yarn test:ci

      - name: Build frontend
        run: yarn build

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run Go tests via Mage
        uses: magefile/mage-action@v3
        with:
          version: ${{ env.MAGE_VERSION }}
          args: vtest

      - name: Build backend via Mage
        uses: magefile/mage-action@v3
        with:
          version: ${{ env.MAGE_VERSION }}
          args: -v buildAll
