name: Publish Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

jobs:
  publish-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      ZIP_NAME: archiverappliance-datasource
      NODE_VERSION: '20'
      GO_VERSION: 'stable'
      MAGE_VERSION: 'latest'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install dependencies
        run: yarn install --immutable --prefer-offline

      - name: Build frontend
        run: yarn build

      - name: Run Go tests via Mage
        uses: magefile/mage-action@v3
        with:
          version: ${{ env.MAGE_VERSION }}
          args: vtest

      - name: Build backend via Mage
        uses: magefile/mage-action@v3
        with:
          version: ${{ env.MAGE_VERSION }}
          args: -v buildAll

      - name: Archive Release Files
        run: |
          REPO_DIRECTORY=${PWD##*/}
          pushd ../
          zip -r $REPO_DIRECTORY/${{ env.ZIP_NAME }}.zip $REPO_DIRECTORY -x @$REPO_DIRECTORY/exclude.txt
          popd

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Use the tag name from the push event
          TAG=${{ github.ref_name }}

          gh release create "$TAG" ./${{ env.ZIP_NAME }}.zip \
            --title "$TAG" \
            --notes "This release has been automatically generated." \
            --generate-notes
            --prerelease
